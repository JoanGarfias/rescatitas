services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - .:/var/www/html
    networks:
      - rescatitas_network

  postgres:
    image: postgres:17
    ports:
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rescatitas_network
volumes:
  postgres_data:

networks:
  rescatitas_network:
    driver: bridge